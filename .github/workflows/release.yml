name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run tests
        run: node tests/chord-walk.test.mjs

      # --- Release steps: only on a pushed version tag (e.g. v2.6.1) ---

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        # --publish never: don't let electron-builder create its own draft
        # release; the "Create Release" step below publishes the real one.
        run: npx electron-builder --win --publish never

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: The Tightening ${{ github.ref_name }}
          files: release/*.exe
          generate_release_notes: true
