name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run tests
        run: node tests/chord-walk.test.mjs

      # --- Release steps: only on a pushed version tag (e.g. v2.9.0) ---

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win --publish never

      - name: Zip installer and compute SHA256
        if: startsWith(github.ref, 'refs/tags/v')
        id: pkg
        shell: pwsh
        run: |
          $exe = "release\the-tightening-setup.exe"
          $zip = "release\the-tightening-setup.zip"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          Compress-Archive -Path $exe -DestinationPath $zip
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: The Tightening ${{ github.ref_name }}
          files: release/the-tightening-setup.zip
          generate_release_notes: true
          body: |
            **SHA256** (installer): `${{ steps.pkg.outputs.sha256 }}`

            > **Windows SmartScreen warning?** Click **More info → Run anyway**. The installer is not yet code-signed. Verify the file with:
            > ```powershell
            > Get-FileHash the-tightening-setup.exe -Algorithm SHA256
            > ```
